services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: eventhub
      MYSQL_USER: eventhub
      MYSQL_PASSWORD: eventhub
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ueventhub", "-peventhub"]
      interval: 10s
      timeout: 5s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8080:8080"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro

  backend:
    build: ./backend
    env_file:
      - .env.example
    environment:
      DATABASE_URL: mysql+pymysql://eventhub:eventhub@db:3306/eventhub
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200}
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_ISSUER_URL: ${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}
      UPLOAD_FOLDER: /app/uploads
    ports:
      - "5000:5000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    depends_on:
      - backend
      - keycloak

volumes:
  mysql_data:
  keycloak_data:
  backend_uploads:
